services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  sniper-plugin:
    # This expects the Shopify app scaffold to live in ./sniper-plugin
    build:
      context: ./sniper-plugin
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_APP_URL: http://localhost:3000
      SHOPIFY_API_KEY: dummy
      SHOPIFY_API_SECRET: dummy
      SCOPES: write_products
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  e2e:
    image: mcr.microsoft.com/playwright:v1.54.1-jammy
    working_dir: /work
    volumes:
      - ./:/work
      - e2e_node_modules:/work/node_modules
    environment:
      BASE_URL: http://sniper-plugin:3000
    depends_on:
      - sniper-plugin
    command: ["bash", "-lc", "cd /work && npm ci && npx playwright install --with-deps && npx playwright test"]

volumes:
  postgres_data:
  redis_data:
  e2e_node_modules:

